<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 1 - English Basics</title>
    <!-- Google Fonts: Outfit for modern, clean, friendly aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header Bar -->
        <header class="app-header">
            <button class="btn-close" id="btn-close" title="Restart Quiz">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
            
            <!-- Duolingo style progress container -->
            <div class="progress-container">
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progress-bar">
                        <div class="progress-bar-glow"></div>
                    </div>
                </div>
                <span class="progress-text" id="progress-text">1/20</span>
            </div>

            <!-- Score/Crown Display -->
            <div class="header-stats">
                <div class="stat-item points" title="Current Score">
                    <svg class="icon-spin" viewBox="0 0 24 24" width="24" height="24">
                        <path fill="#FFC800" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/>
                    </svg>
                    <span id="score-counter">0</span>
                </div>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="quiz-workspace" id="quiz-workspace">
            <!-- Left Mascot Area (Duolingo visual mascot) -->
            <div class="mascot-section">
                <div class="mascot-container">
                    <!-- Duo-like green owl SVG helper -->
                    <!-- Bujji mascot SVG helper -->
                    <svg viewBox="0 0 200 200" class="mascot-svg" id="mascot-graphic">
                        <defs>
                            <!-- Metallic gradients -->
                            <linearGradient id="metal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#4A5568"/>
                                <stop offset="50%" stop-color="#2D3748"/>
                                <stop offset="100%" stop-color="#1A202C"/>
                            </linearGradient>
                            <linearGradient id="dome-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#718096" stop-opacity="0.6"/>
                                <stop offset="100%" stop-color="#2D3748" stop-opacity="0"/>
                            </linearGradient>
                            <!-- Eye glow filter -->
                            <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="3" result="blur" />
                                <feMerge>
                                    <feMergeNode in="blur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>
                        
                        <!-- Shadow under Bujji -->
                        <ellipse cx="100" cy="180" rx="55" ry="10" fill="#E2E8F0"/>
                        
                        <!-- Robot Neck/Base connection -->
                        <path d="M70 140 L130 140 L120 170 L80 170 Z" fill="#1A202C" />
                        <rect x="75" y="165" width="50" height="10" rx="5" fill="#4A5568" />
                        
                        <!-- Round Head Body -->
                        <circle cx="100" cy="100" r="65" fill="url(#metal-grad)" stroke="#1A202C" stroke-width="4" />
                        
                        <!-- Upper Dome Highlight -->
                        <path d="M37 90 C 37 45, 163 45, 163 90 Z" fill="url(#dome-highlight)" />
                        
                        <!-- Panelling lines on head -->
                        <path d="M35 100 L165 100" stroke="#1A202C" stroke-width="3" />
                        <path d="M38 80 C 60 70, 140 70, 162 80" stroke="#1A202C" stroke-width="2" fill="none" opacity="0.5" />
                        
                        <!-- Visor Band -->
                        <path d="M37 92 C 50 85, 150 85, 163 92 L161 115 C 150 122, 50 122, 39 115 Z" fill="#0D1117" stroke="#1A202C" stroke-width="2" />
                        
                        <!-- Glowing Visor Eyes (Bujji style slit eyes) -->
                        <g class="bujji-eyes">
                            <polygon points="52,100 85,100 81,108 55,108" fill="#81E6D9" filter="url(#neon-glow)" />
                            <polygon points="54,101 83,101 80,107 56,107" fill="#EBF8FF" />
                            
                            <polygon points="115,100 148,100 145,108 119,108" fill="#81E6D9" filter="url(#neon-glow)" />
                            <polygon points="117,101 146,101 144,107 119,107" fill="#EBF8FF" />
                        </g>
                        
                        <!-- Forehead Detail / Logo -->
                        <circle cx="100" cy="65" r="7" fill="#1A202C" />
                        <circle cx="100" cy="65" r="4" fill="#FFC800" />
                        
                        <!-- Side ear bolts -->
                        <rect x="27" y="90" width="8" height="20" rx="3" fill="#4A5568" stroke="#1A202C" stroke-width="2" />
                        <rect x="165" y="90" width="8" height="20" rx="3" fill="#4A5568" stroke="#1A202C" stroke-width="2" />
                    </svg>
                    <!-- Speech bubble -->
                    <div class="speech-bubble">
                        <p id="mascot-bubble">Welcome to Level 1! Let's test your English basics. Select an answer to begin!</p>
                    </div>
                </div>
            </div>

            <!-- Quiz Card Container -->
            <div class="question-container">
                <div class="question-card" id="question-card">
                    <span class="category-badge" id="category-badge">VOCABULARY</span>
                    <h2 class="question-text" id="question-text">Loading question...</h2>
                    
                    <div class="options-grid" id="options-grid">
                        <!-- Option buttons loaded dynamically by JavaScript -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Final Results Page (hidden by default) -->
        <main class="results-container hidden" id="results-container">
            <div class="results-card">
                <!-- Mascot inside results -->
                <div class="results-mascot">
                    <svg viewBox="0 0 200 200" class="mascot-svg-large" id="results-mascot-graphic">
                        <defs>
                            <linearGradient id="metal-grad-large" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#4A5568"/>
                                <stop offset="50%" stop-color="#2D3748"/>
                                <stop offset="100%" stop-color="#1A202C"/>
                            </linearGradient>
                            <filter id="neon-glow-large" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="3" result="blur" />
                                <feMerge>
                                    <feMergeNode in="blur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>
                        <!-- Shadow under Bujji -->
                        <ellipse cx="100" cy="180" rx="60" ry="10" fill="#E2E8F0"/>
                        
                        <!-- Robot Neck/Base connection -->
                        <path d="M70 140 L130 140 L120 170 L80 170 Z" fill="#1A202C" />
                        <rect x="75" y="165" width="50" height="10" rx="5" fill="#4A5568" />
                        
                        <!-- Round Head Body -->
                        <circle cx="100" cy="100" r="65" fill="url(#metal-grad-large)" stroke="#1A202C" stroke-width="4" />
                        
                        <!-- Panelling lines on head -->
                        <path d="M35 100 L165 100" stroke="#1A202C" stroke-width="3" />
                        
                        <!-- Visor Band -->
                        <path d="M37 92 C 50 85, 150 85, 163 92 L161 115 C 150 122, 50 122, 39 115 Z" fill="#0D1117" stroke="#1A202C" stroke-width="2" />
                        
                        <!-- Glowing Visor Eyes (Happy curved eyes for results page by default) -->
                        <path d="M52,106 Q68,96 84,106" stroke="#81E6D9" stroke-width="8" stroke-linecap="round" fill="none" filter="url(#neon-glow-large)" />
                        <path d="M116,106 Q132,96 148,106" stroke="#81E6D9" stroke-width="8" stroke-linecap="round" fill="none" filter="url(#neon-glow-large)" />
                        
                        <!-- Side ear bolts -->
                        <rect x="27" y="90" width="8" height="20" rx="3" fill="#4A5568" stroke="#1A202C" stroke-width="2" />
                        <rect x="165" y="90" width="8" height="20" rx="3" fill="#4A5568" stroke="#1A202C" stroke-width="2" />
                    </svg>
                </div>

                <h1 class="results-title" id="results-title">Quiz Completed!</h1>
                <p class="results-subtitle" id="results-subtitle">Here is how you performed in Level 1 - English Basics</p>

                <!-- Gamified Badge / Trophy banner -->
                <div class="result-badge-container" id="result-badge-container">
                    <div class="unlocked-badge" id="unlocked-badge">
                        <div class="crown-glow"></div>
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="#FFC800">
                            <path d="M12 2L9 9H2L7 14L5 21L12 17L19 21L17 14L22 9H15L12 2Z"/>
                        </svg>
                    </div>
                </div>

                <!-- Circular Progress SVG Ring -->
                <div class="circular-progress-wrapper">
                    <svg viewBox="0 0 100 100" class="circular-svg">
                        <circle class="ring-bg" cx="50" cy="50" r="40" />
                        <circle class="ring-fill" id="circular-percentage-ring" cx="50" cy="50" r="40" stroke-dasharray="251.2" stroke-dashoffset="251.2" />
                    </svg>
                    <div class="circular-percentage-text" id="circular-percentage-text">0%</div>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-num" id="stat-total">20</span>
                        <span class="stat-label">Total Questions</span>
                    </div>
                    <div class="stat-card correct">
                        <span class="stat-num" id="stat-correct">0</span>
                        <span class="stat-label">Correct</span>
                    </div>
                    <div class="stat-card wrong">
                        <span class="stat-num" id="stat-wrong">0</span>
                        <span class="stat-label">Wrong</span>
                    </div>
                </div>

                <!-- Action Button in card -->
                <button class="btn-primary ripple-btn" id="btn-result-action">Continue</button>
            </div>

            <!-- Quiz Breakdown & Review Section -->
            <div class="review-section">
                <h3 class="review-header">Review Your Answers</h3>
                <div class="review-list" id="review-list">
                    <!-- Loaded dynamically via script.js -->
                </div>
            </div>
        </main>

        <!-- Navigation Footer -->
        <footer class="app-footer" id="app-footer">
            <div class="footer-buttons">
                <button class="btn-secondary" id="btn-prev" disabled>
                    <svg viewBox="0 0 24 24" width="20" height="20" style="margin-right: 4px; vertical-align: middle;">
                        <path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                    Previous
                </button>
                <button class="btn-primary" id="btn-next" disabled>
                    Next
                    <svg viewBox="0 0 24 24" width="20" height="20" style="margin-left: 4px; vertical-align: middle;">
                        <path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
