{% extends 'base.html' %}

{% block title %}Login - English Winglish{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <!-- Welcoming Robot Mascot -->
        <div class="auth-mascot">
            <svg viewBox="0 0 200 200" class="mascot-svg-auth">
                <defs>
                    <linearGradient id="metal-grad-auth" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#4A5568"/>
                        <stop offset="50%" stop-color="#2D3748"/>
                        <stop offset="100%" stop-color="#1A202C"/>
                    </linearGradient>
                    <filter id="neon-glow-auth" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <ellipse cx="100" cy="180" rx="55" ry="10" fill="#E2E8F0"/>
                <path d="M70 140 L130 140 L120 170 L80 170 Z" fill="#1A202C" />
                <circle cx="100" cy="100" r="65" fill="url(#metal-grad-auth)" stroke="#1A202C" stroke-width="4" />
                <path d="M37 92 C 50 85, 150 85, 163 92 L161 115 C 150 122, 50 122, 39 115 Z" fill="#0D1117" stroke="#1A202C" stroke-width="2" />
                <!-- Happy visors -->
                <path d="M52,106 Q68,96 84,106" stroke="#58CC02" stroke-width="8" stroke-linecap="round" fill="none" filter="url(#neon-glow-auth)" />
                <path d="M116,106 Q132,96 148,106" stroke="#58CC02" stroke-width="8" stroke-linecap="round" fill="none" filter="url(#neon-glow-auth)" />
                <circle cx="100" cy="65" r="7" fill="#1A202C" />
                <circle cx="100" cy="65" r="4" fill="#FFC800" />
            </svg>
        </div>
        
        <h2 class="auth-title">Welcome Back!</h2>
        <p class="auth-subtitle">Log in to continue your English learning path</p>
        
        <form action="{{ url_for('auth.login') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="email_or_roll">Email Address or Roll Number</label>
                <input type="text" id="email_or_roll" name="email_or_roll" required placeholder="Enter Email or Roll Number" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter Password" class="form-input">
            </div>
            
            <button type="submit" class="btn-primary auth-submit-btn">Log In</button>
        </form>
        
        <div class="auth-footer">
            <span>Don't have an account?</span>
            <a href="{{ url_for('auth.register') }}">Create one now</a>
        </div>
    </div>
</div>
{% endblock %}
